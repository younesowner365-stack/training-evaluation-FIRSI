{% extends "base.html" %}{% block page_title %}Sessions & événements{% endblock %}{% block content %}<div class="grid grid-2"><div class="card"><form method="post"><label>Titre</label><input name="titre" required><label>Thématique</label><select name="categorie_id">{% for c in categories %}<option value="{{ c.id }}">{{ c.nom }}</option>{% endfor %}</select><label>Questionnaire</label><select name="questionnaire_id">{% for q in questionnaires %}<option value="{{ q.id }}">{{ q.titre }}</option>{% endfor %}</select><label>Date début</label><input type="date" name="date_debut"><label>Date fin</label><input type="date" name="date_fin"><label>Lieu</label><input name="lieu"><label>Animateur</label><input name="animateur"><label>Description</label><textarea name="description"></textarea><br><br><button class="btn">Créer</button></form></div><div class="card"><table><tr><th>Session</th><th>Thématique</th><th>Questionnaire</th></tr>{% for s in sessions %}<tr><td>{{ s.titre }}</td><td>{{ s.categorie.nom }}</td><td>{{ s.questionnaire.titre }}</td></tr>{% endfor %}</table></div></div>{% endblock %}
