{% extends "base.html" %}{% block page_title %}Questionnaires{% endblock %}{% block content %}<div class="grid grid-2"><div class="card"><h3>Nouveau questionnaire</h3><form method="post"><label>Titre</label><input name="titre" required><label>Thématique</label><select name="categorie_id">{% for c in categories %}<option value="{{ c.id }}">{{ c.nom }}</option>{% endfor %}</select><label>Description</label><textarea name="description"></textarea><br><br><button class="btn">Créer</button></form></div><div class="card"><table><tr><th>Titre</th><th>Thématique</th><th>Questions</th></tr>{% for q in questionnaires %}<tr><td><a href="/questionnaires/{{ q.id }}"><strong>{{ q.titre }}</strong></a></td><td>{{ q.categorie.nom }}</td><td>{{ q.questions|length }}</td></tr>{% endfor %}</table></div></div>{% endblock %}
