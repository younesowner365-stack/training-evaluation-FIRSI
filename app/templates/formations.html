{% extends 'base.html' %}{% block content %}<div class="page-title"><div><span class="eyebrow">CATALOGUE</span><h1>Formations</h1><p>Un catalogue vivant, administrable sans toucher au code.</p></div></div><div class="panel form-panel"><form method="post" class="form-grid"><input class="form-control" name="titre" placeholder="Intitulé" required><select class="form-select" name="type_formation" required><option value="">Type de formation</option><option>Courte</option><option>Certifiante</option><option>Diplômante</option></select><input class="form-control wide" name="description" placeholder="Description"><button class="btn btn-primary">Ajouter</button></form></div><div class="cards-grid">{% for f in formations %}<div class="training-card"><span class="tag">{{f.type_formation}}</span><h3>{{f.titre}}</h3><p>{{f.description or 'Aucune description.'}}</p><div class="card-footer"><span class="status {{'ok' if f.active}}">{{'Active' if f.active else 'Inactive'}}</span><form method="post" action="/formations/{{f.id}}/toggle"><button class="btn btn-sm btn-outline-secondary">{{'Archiver' if f.active else 'Réactiver'}}</button></form></div></div>{% endfor %}</div>{% endblock %}
