{% extends "base.html" %}{% block page_title %}Éditeur : {{ questionnaire.titre }}{% endblock %}{% block content %}<div class="grid grid-2"><div class="card"><h3>Ajouter une question</h3><form method="post" action="/questionnaires/{{ questionnaire.id }}/questions"><label>Question</label><textarea name="libelle" required></textarea><label>Type</label><select name="type_reponse"><option value="note5">Note /5</option><option value="note10">Note /10</option><option value="oui_non">Oui / Non</option><option value="choix">Choix unique</option><option value="texte">Texte court</option><option value="paragraphe">Paragraphe</option></select><label>Options séparées par ;</label><input name="options"><label>Obligatoire</label><select name="obligatoire"><option value="oui">Oui</option><option value="non">Non</option></select><br><br><button class="btn">Ajouter</button></form></div><div class="card">{% for q in questionnaire.questions %}<div class="question"><strong>{{ q.ordre }}. {{ q.libelle }}</strong><p class="muted">{{ q.type_reponse }}</p><form method="post" action="/questions/{{ q.id }}/delete"><button class="btn danger">Supprimer</button></form></div>{% endfor %}</div></div>{% endblock %}
