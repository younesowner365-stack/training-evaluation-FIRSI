{% extends "base.html" %}{% block page_title %}Collaborateurs{% endblock %}{% block content %}<div class="grid grid-2"><div class="card"><form method="post"><label>Nom</label><input name="nom" required><label>Prénom</label><input name="prenom" required><label>E-mail</label><input type="email" name="email" required><label>Fonction</label><input name="fonction"><label>Département</label><select name="departement_id"><option value="">—</option>{% for d in departements %}<option value="{{ d.id }}">{{ d.nom }}</option>{% endfor %}</select><br><br><button class="btn">Ajouter</button></form></div><div class="card"><table><tr><th>Code</th><th>Collaborateur</th><th>Département</th></tr>{% for c in collaborateurs %}<tr><td>{{ c.code }}</td><td>{{ c.prenom }} {{ c.nom }}<br><span class="muted">{{ c.email }}</span></td><td>{{ c.departement.nom if c.departement else '' }}</td></tr>{% endfor %}</table></div></div>{% endblock %}
