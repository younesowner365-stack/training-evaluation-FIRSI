{% extends "base.html" %}{% block page_title %}Affectations & invitations{% endblock %}{% block content %}<div class="grid grid-2"><div class="card"><form method="post"><label>Collaborateur</label><select name="collaborateur_id">{% for c in collaborateurs %}<option value="{{ c.id }}">{{ c.prenom }} {{ c.nom }}</option>{% endfor %}</select><label>Session</label><select name="session_id">{% for s in sessions %}<option value="{{ s.id }}">{{ s.titre }}</option>{% endfor %}</select><label>Envoyer invitation</label><select name="envoyer_invitation"><option value="oui">Oui</option><option value="non">Non</option></select><br><br><button class="btn">Affecter</button></form></div><div class="card"><table><tr><th>Collaborateur</th><th>Session</th><th>Statut</th><th></th></tr>{% for a in affectations %}<tr><td>{{ a.collaborateur.prenom }} {{ a.collaborateur.nom }}</td><td>{{ a.session.titre }}</td><td>{{ a.statut }}</td><td><form method="post" action="/affectations/{{ a.id }}/invite"><button class="btn secondary">Relancer</button></form></td></tr>{% endfor %}</table></div></div>{% endblock %}
