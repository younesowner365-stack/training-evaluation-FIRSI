<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Évaluation des formations{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}"></head><body><div class="app-shell"><aside class="sidebar"><div class="sidebar-brand"><div class="brand-icon small">RH</div><div><strong>Evaluation</strong><span>Formations</span></div></div><nav><a href="/dashboard" class="{{ 'active' if active_page=='dashboard' else '' }}"><i class="fa-solid fa-chart-line"></i>Tableau de bord</a><a href="/collaborateurs" class="{{ 'active' if active_page=='collaborateurs' else '' }}"><i class="fa-solid fa-users"></i>Collaborateurs</a><a href="/formations" class="{{ 'active' if active_page=='formations' else '' }}"><i class="fa-solid fa-graduation-cap"></i>Formations</a><a href="/affectations" class="{{ 'active' if active_page=='affectations' else '' }}"><i class="fa-solid fa-link"></i>Affectations</a><a href="/evaluations" class="{{ 'active' if active_page=='evaluations' else '' }}"><i class="fa-solid fa-star"></i>Évaluations</a></nav><a class="logout-link" href="/logout"><i class="fa-solid fa-right-from-bracket"></i>Déconnexion</a></aside><main class="main-content"><header class="topbar"><div><h5 class="mb-0">{% block page_title %}{% endblock %}</h5><small class="text-muted">Plateforme RH</small></div><div class="user-badge"><i class="fa-solid fa-user"></i> Administrateur</div></header><section class="page-content">{% block content %}{% endblock %}</section></main></div></body></html>
