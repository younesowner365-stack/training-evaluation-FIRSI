<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}FIRSI{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static',path='css/style.css') }}"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="app-shell"><aside class="sidebar"><div class="logo"><b>F</b><div><strong>FIRSI</strong><small>Formation Analytics</small></div></div><div class="nav-caption">PILOTAGE</div><nav><a class="{{'active' if active_page=='dashboard'}}" href="/dashboard"><i class="fa-solid fa-grid-2"></i>Tableau de bord</a>{% if user.role=='ADMIN' %}<a class="{{'active' if active_page=='users'}}" href="/admin/utilisateurs"><i class="fa-solid fa-user-shield"></i>Comptes & rôles</a>{% endif %}<a class="{{'active' if active_page=='collaborateurs'}}" href="/collaborateurs"><i class="fa-solid fa-users"></i>Collaborateurs</a><a class="{{'active' if active_page=='formations'}}" href="/formations"><i class="fa-solid fa-graduation-cap"></i>Formations</a><a class="{{'active' if active_page=='affectations'}}" href="/affectations"><i class="fa-solid fa-diagram-project"></i>Affectations</a><a class="{{'active' if active_page=='evaluations'}}" href="/evaluations"><i class="fa-solid fa-star"></i>Évaluations</a></nav><div class="sidebar-foot"><a class="logout" href="/logout"><i class="fa-solid fa-arrow-right-from-bracket"></i>Déconnexion</a><small>© FIRSI - UM6P</small></div></aside><main><header><div><span class="eyebrow">ESPACE {{user.role}}</span><h5>{{user.name}}</h5></div><div class="header-actions"><span class="live-dot"><i></i> Système opérationnel</span><div class="avatar">{{user.name[0]}}</div></div></header><section class="content">{% block content %}{% endblock %}</section></main></div></body></html>
